let map = null;

function getMap() {
  if (!map) {
    // folium stores map in a variable like map_XXXX
    const keys = Object.keys(window).filter(k => k.startsWith('map_'));
    if (keys.length) map = window[keys[0]];
  }
  return map;
}

function highlight(text, query) {
  if (!query) return text;
  const re = new RegExp('(' + query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'gi');
  return text.replace(re, '<mark style="background:#bfdbfe;border-radius:3px;padding:0 1px">$1</mark>');
}

document.getElementById('search-box').addEventListener('input', function() {
  const q = this.value.trim().toUpperCase();
  const clearBtn = document.getElementById('clear-btn');
  const resultsDiv = document.getElementById('search-results');
  
  clearBtn.style.display = q ? 'block' : 'none';
  
  if (!q) {
    resultsDiv.style.display = 'none';
    return;
  }
  
  const matches = agencias.filter(a => a.name.toUpperCase().includes(q));
  
  if (!matches.length) {
    resultsDiv.innerHTML = '<div style="padding:14px 18px;color:#888;font-size:13px;">No se encontraron resultados</div>';
    resultsDiv.style.display = 'block';
    return;
  }
  
  let html = `<div id="result-count">${matches.length} resultado${matches.length !== 1 ? 's' : ''}</div>`;
  matches.slice(0, 15).forEach(a => {
    html += `<div class="result-item" onclick="goToAgency(${a.lat}, ${a.lon}, '${a.name.replace(/'/g, "\'")}')" >
      <div class="result-num">${a.num}</div>
      <div class="result-name">${highlight(a.name, this.value.trim())}</div>
    </div>`;
  });
  if (matches.length > 15) {
    html += `<div style="padding:8px 18px;font-size:12px;color:#888;">... y ${matches.length - 15} más. Refina tu búsqueda.</div>`;
  }
  resultsDiv.innerHTML = html;
  resultsDiv.style.display = 'block';
});

function goToAgency(lat, lon, name) {
  const m = getMap();
  if (m) {
    m.setView([lat, lon], 16, {animate: true});
    // open popup by finding closest marker
    m.eachLayer(function(layer) {
      if (layer.getLatLng) {
        const ll = layer.getLatLng();
        if (Math.abs(ll.lat - lat) < 0.0001 && Math.abs(ll.lng - lon) < 0.0001) {
          layer.openPopup();
        }
      }
    });
  }
  document.getElementById('search-box').value = name;
  document.getElementById('search-results').style.display = 'none';
  document.getElementById('clear-btn').style.display = 'block';
}

function clearSearch() {
  document.getElementById('search-box').value = '';
  document.getElementById('search-results').style.display = 'none';
  document.getElementById('clear-btn').style.display = 'none';
}

// Close results when clicking outside
document.addEventListener('click', function(e) {
  if (!document.getElementById('search-container').contains(e.target)) {
    document.getElementById('search-results').style.display = 'none';
  }
});
</script>
